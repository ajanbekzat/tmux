# osx clipboard
# NOTE: reattach-to-user-namespace is obsolete on modern macOS/tmux (clipboard works
# natively via `set-clipboard on` + pbcopy). The old compound default-command also broke
# tmux-resurrect: it prefixes the pane command with `exec`, which replaced the shell with
# `which` and killed every restored pane (crashing the server on restore). Left unset.

# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
